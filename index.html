<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Terrace Retreat · Sitges Guide</title>
  <style>
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      min-height: 100%;
      background: #f7efe5;
      font-family: Georgia, "Times New Roman", serif;
    }
    body { display: flex; justify-content: center; }
    .page {
      width: 100%;
      max-width: 820px;
      min-height: 100dvh;
      position: relative;
      background-image: url("assets/language-homepage-background.png");
      background-size: cover;
      background-position: center top;
      background-repeat: no-repeat;
      aspect-ratio: 2 / 3;
    }
    .language-links {
      position: absolute;
      left: 25.2%;
      right: 25.2%;
      top: 70.2%;
      display: grid;
      gap: 1.55%;
    }
    .language-links a {
      display: block;
      height: clamp(64px, 7.2vw, 92px);
      border-radius: 18px;
      text-decoration: none;
      -webkit-tap-highlight-color: transparent;
    }
    .language-links a:focus-visible {
      outline: 3px solid #0b3b2b;
      outline-offset: 4px;
    }
    @media (max-width: 600px) {
      .page { max-width: none; background-size: cover; background-position: center top; }
      .language-links { left: 24.5%; right: 24.5%; top: 70.3%; gap: 10px; }
      .language-links a { height: 73px; border-radius: 16px; }
    }
    @media (max-width: 390px) { .language-links a { height: 68px; } }
  </style>
</head>
<body>
  <main class="page" aria-label="Terrace Retreat Sitges language selection">
    <nav class="language-links" aria-label="Choose your language">
      <a href="es/index.html" aria-label="Español - Guía de Sitges"></a>
      <a href="en/index.html" aria-label="English - Sitges Guide"></a>
      <a href="fr/index.html" aria-label="Français - Guide de Sitges"></a>
    </nav>
  </main>
</body>
</html>
