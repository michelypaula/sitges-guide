
<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">
<style>
body {
  margin:0;
  font-family:system-ui;
  background:#f7f1e9;
}
.section {
  margin:12px;
  border-radius:20px;
  overflow:hidden;
  box-shadow:0 10px 20px rgba(0,0,0,.08);
}
.section img {
  width:100%;
  display:block;
}
.carousel {
  display:flex;
  overflow-x:auto;
  gap:12px;
  padding:12px;
}
.card {
  flex:0 0 85%;
  border-radius:20px;
  overflow:hidden;
  background:white;
}
.card img {
  width:100%;
}
</style>
</head>
<body>

<div class="section">
<img src="assets/hero.png">
</div>

<div class="carousel">
<div class="card"><img src="assets/top_cards.png"></div>
</div>

<div class="carousel">
<div class="card"><img src="assets/bottom_cards.png"></div>
</div>

<div class="section">
<img src="assets/footer.png">
</div>

</body>
</html>
